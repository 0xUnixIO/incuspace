name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Build frontend
        run: cd web && bun install && bun run build

      - uses: actions/setup-go@v5
        with:
          go-version: 'stable'
          cache: true

      - name: Build & vet
        run: |
          go vet ./...
          go build ./...
