name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Build frontend
        run: cd web && bun install --frozen-lockfile && bun run build

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build binaries
        run: |
          mkdir -p release
          VERSION=${{ github.ref_name }}
          LDFLAGS="-s -w -X main.Version=${VERSION}"

          GOOS=linux GOARCH=amd64 go build -ldflags="${LDFLAGS}" \
            -o release/incus-panel-linux-amd64 ./cmd/incus-panel

          GOOS=linux GOARCH=arm64 go build -ldflags="${LDFLAGS}" \
            -o release/incus-panel-linux-arm64 ./cmd/incus-panel

      - name: Generate checksums
        run: |
          cd release
          sha256sum incus-panel-linux-amd64 incus-panel-linux-arm64 > sha256sums.txt
          cat sha256sums.txt

      - name: Copy install script
        run: cp scripts/install.sh release/install.sh

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            release/incus-panel-linux-amd64
            release/incus-panel-linux-arm64
            release/sha256sums.txt
            release/install.sh
